<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vacaciones 2026-2027 — Bauhaus Neo-Brutalist</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">

    <style>
        /* --- VARIABLES DE DISEÑO (DESIGN.md) --- */
        :root { 
            --bg: #f5f0e8;          /* Warm off-white, aged paper */
            --primary: #1a1a1a;     /* Near-black para texto y bordes */
            --accent-yellow: #ffcc00; /* High-energy para estados activos */
            --accent-blue: #0055ff;  /* Elementos interactivos */
            
            --border-thick: 3px solid #1a1a1a;
            --shadow-offset: 5px 5px 0px #1a1a1a;
        }
        
        /* --- RESET Y CONFIGURACIÓN GLOBAL --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            background: var(--bg); 
            color: var(--primary); 
            font-family: 'Inter', sans-serif; 
            padding: 20px; 
            padding-bottom: 100px; /* Margen de seguridad para que la barra inferior no tape nada */
        }
        
        .container { max-width: 1100px; margin: 0 auto; }
        
        /* Encabezado flexible para alojar el cambio de año */
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: var(--border-thick);
            margin: 20px 0 35px 0;
            padding-bottom: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-flex h2 { 
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.5rem;
            text-transform: uppercase;
            font-weight: 700; 
            line-height: 0.9;
            letter-spacing: -1px; 
        }

        @media (max-width: 768px) {
            .header-flex h2 { font-size: 2.2rem; }
            .header-flex { justify-content: center; text-align: center; }
        }

        h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* --- CONTROL DE AÑO SUPERIOR BRUTALISTA --- */
        .year-switcher {
            display: flex;
            gap: 10px;
        }

        .btn-anio { 
            font-family: 'Space Grotesk', sans-serif;
            padding: 10px 20px; 
            border: var(--border-thick); 
            background: #ffffff; 
            color: var(--primary); 
            cursor: pointer; 
            font-weight: 700;
            text-transform: uppercase;
            font-size: 1rem;
            box-shadow: var(--shadow-offset);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn-anio:hover {
            background: var(--primary);
            color: #ffffff;
        }

        .btn-anio.active { 
            background: var(--accent-yellow); 
            color: var(--primary); 
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--primary);
        }
        
        /* --- BARRA INFERIOR FIJA DEL INDEX --- */
        .bottom-navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--bg);
            border-top: var(--border-thick);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--primary);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            gap: 4px;
            flex: 1;
            transition: background-color 0.1s, color 0.1s;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: var(--primary);
            transition: fill 0.1s;
        }

        .nav-item:hover {
            background-color: rgba(255, 204, 0, 0.15);
        }

        /* Clase activa para identificar la sección actual */
        .nav-item.active {
            background-color: var(--accent-blue);
            color: #ffffff;
        }

        .nav-item.active svg {
            fill: #ffffff;
        }
        
        /* --- SELECTOR DE USUARIOS --- */
        .selector { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 12px; 
            margin-bottom: 30px; 
            width: 100%;
        }

        .user-card { 
            padding: 12px; 
            background: #ffffff; 
            border: var(--border-thick); 
            cursor: pointer; 
            text-align: center; 
            box-shadow: var(--shadow-offset);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .user-card.active { 
            background: var(--accent-yellow);
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px var(--primary);
        }

        .user-card strong { 
            display: block; 
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem; 
            text-transform: uppercase;
            margin-top: 2px; 
        }

        .total-box { 
            font-size: 0.85rem; 
            color: var(--primary); 
            font-weight: 600;
            margin-top: 4px; 
        }
        
        /* --- PANEL DE RESUMEN DETALLADO --- */
        .resumen-panel { 
            background: #ffffff; 
            padding: 20px; 
            margin-bottom: 35px; 
            border: var(--border-thick);
            box-shadow: var(--shadow-offset);
        }

        .resumen-panel h3 { 
            font-size: 1.3rem; 
            border-bottom: var(--border-thick); 
            padding-bottom: 8px; 
            margin-bottom: 15px; 
        }

        .resumen-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .resumen-item { font-size: 0.9rem; }
        .resumen-item-lineas { margin-top: 8px; padding-left: 10px; border-left: 3px solid transparent; }
        
        /* --- CALENDARIO BRUTALISTA --- */
        .calendario { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 24px; 
        }

        .mes-card { 
            background: #ffffff; 
            padding: 16px; 
            border: var(--border-thick);
            box-shadow: var(--shadow-offset);
        }

        .mes-card h3 { 
            text-align: left; 
            font-size: 1.4rem; 
            color: var(--primary); 
            margin-bottom: 12px; 
            border-bottom: 2px solid var(--primary);
            padding-bottom: 4px;
        }
        
        .grid-header { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            text-align: center; 
            font-size: 0.8rem; 
            color: var(--primary); 
            margin-bottom: 8px; 
            font-weight: 700; 
            font-family: 'Space Grotesk', sans-serif;
        }

        .grid-dias { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        
        .dia { 
            aspect-ratio: 1; 
            background: transparent; 
            display: flex; 
            flex-direction: column; 
            cursor: pointer; 
            position: relative; 
            overflow: hidden; 
            border: 2px solid var(--primary);
            transition: background-color 0.1s;
        }

        .dia:hover { 
            background-color: rgba(255, 204, 0, 0.15); 
        }
        
        .day-num { 
            font-size: 0.75rem; 
            padding: 2px 4px; 
            font-weight: 700; 
            pointer-events: none; 
            z-index: 2; 
            align-self: flex-start; 
        }
        
        .bloque-color { 
            flex: 1; 
            width: 100%; 
            pointer-events: none; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem; 
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            color: #ffffff;
            border-top: 1px solid var(--primary);
            line-height: 1;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h2>Panel de Vacaciones</h2>
        <div class="year-switcher">
            <button id="b2026" class="btn-anio" onclick="setAnio(2026)">2026</button>
            <button id="b2027" class="btn-anio" onclick="setAnio(2027)">2027</button>
        </div>
    </div>
    
    <div id="selector" class="selector"></div>
    <div id="resumen" class="resumen-panel"></div>
    <div id="cal" class="calendario"></div>
</div>

<nav class="bottom-navbar">
    <a href="index.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path></svg>
        Inicio
    </a>
    <a href="vacaciones.html" class="nav-item active">
        <svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L14 19v-5.5l8 2.5z"></path></svg>
        Vacaciones
    </a>
    <a href="guardias.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5 1.5-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"></path></svg>
        Guardia
    </a>
    <a href="#" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"></path></svg>
        Viernes
    </a>
    <a href="#" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.8 1.42-1.42zM4 10.5H1v2h3v-2zm9-6.8V1h-2v2.7h2zM11 21.3V24h2v-2.7h-2zM18.66 5.42l1.79-1.8-1.41-1.41-1.8 1.79 1.42 1.42zM23 10.5h-3v2h3v-2zm-4.34 7.66l1.8 1.79 1.41-1.41-1.79-1.8-1.42 1.42zM5.54 16.74l-1.8 1.8 1.41 1.41 1.8-1.79-1.41-1.42zM12 5.5c-3.58 0-6.5 2.92-6.5 6.5s2.92 6.5 6.5 6.5 6.5-2.92 6.5-6.5-2.92-6.5-6.5-6.5z"></path></svg>
        Intensiva
    </a>
</nav>

<script>
    const sb = window.supabase.createClient("https://ipxuihzkakirvlszxknd.supabase.co", "sb_publishable_wCYOFOlX8FqkKXPIJ_u1bg_1o2C5La5");
    
    const users = { 'Joaquin': '#16a34a', 'Juan': '#a855f7', 'Leon': '#ef4444', 'Sergio': '#eab308' };
    const mesesNombres = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    let anio = 2026, activeUser = 'Joaquin', datos = {};

    async function cargar() {
        const { data } = await sb.from('vacaciones_v2').select('*').eq('anio', anio);
        datos = {};
        data?.forEach(r => { if(!datos[r.fecha]) datos[r.fecha] = []; datos[r.fecha].push(r.usuario); });
        render();
    }

    async function toggle(f) {
        if(!datos[f]) datos[f] = [];
        const idx = datos[f].indexOf(activeUser);
        if(idx > -1) {
            datos[f].splice(idx, 1);
            render();
            await sb.from('vacaciones_v2').delete().eq('fecha', f).eq('usuario', activeUser).eq('anio', anio);
        } else if(datos[f].length < 3) {
            datos[f].push(activeUser);
            render();
            await sb.from('vacaciones_v2').insert({fecha: f, usuario: activeUser, anio: anio});
        }
    }

    function render() {
        document.getElementById('b2026').classList.toggle('active', anio === 2026);
        document.getElementById('b2027').classList.toggle('active', anio === 2027);
        
        document.getElementById('selector').innerHTML = Object.keys(users).map(u => {
            const total = Object.keys(datos).filter(f => {
                if(!datos[f].includes(u)) return false; 
                const [y, m, d] = f.split('-');
                const dayOfWeek = new Date(y, m - 1, d).getDay();
                return dayOfWeek !== 0 && dayOfWeek !== 6;
            }).length;
            
            return `<div class="user-card ${activeUser === u ? 'active' : ''}" onclick="activeUser='${u}'; render()">
                <span style="color:${users[u]}; font-size: 1.1rem; vertical-align: middle;">●</span>
                <strong>${u}</strong>
                <div class="total-box">${total} días</div>
            </div>`;
        }).join('');

        let resHtml = '<h3>Resumen de Días Seleccionados</h3><div class="resumen-grid">';
        Object.keys(users).forEach(u => {
            resHtml += `<div class="resumen-item">
                <span style="color:${users[u]}; font-weight: 700; font-size: 1.05rem; font-family: 'Space Grotesk'; text-transform: uppercase;">● ${u}</span>
                <div class="resumen-item-lineas" style="border-left-color: ${users[u]}">`;
            
            let tieneDatos = false;
            mesesNombres.forEach((m, i) => {
                const dias = Object.keys(datos)
                    .filter(f => f.startsWith(`${anio}-${String(i+1).padStart(2,'0')}`) && datos[f].includes(u))
                    .map(f => f.split('-')[2])
                    .sort((a, b) => parseInt(a) - parseInt(b));
                
                if(dias.length > 0) {
                    resHtml += `<b style="color: var(--primary); font-family: 'Space Grotesk';">${m}:</b> ${dias.join(', ')}<br>`;
                    tieneDatos = true;
                }
            });
            if(!tieneDatos) resHtml += `<span style="color: #71717a; font-style: italic;">Sin días elegidos</span>`;
            resHtml += `</div></div>`;
        });
        document.getElementById('resumen').innerHTML = resHtml + '</div>';

        const cal = document.getElementById('cal'); cal.innerHTML = '';
        mesesNombres.forEach((m, idx) => {
            const mesDiv = document.createElement('div'); mesDiv.className = 'mes-card';
            mesDiv.innerHTML = `<h3>${m}</h3>
                <div class="grid-header"><span>D</span><span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span></div>
                <div class="grid-dias" id="m${idx}"></div>`;
            cal.appendChild(mesDiv);
            
            const grid = mesDiv.querySelector('#m'+idx);
            const firstDay = new Date(anio, idx, 1).getDay();
            const daysInMonth = new Date(anio, idx + 1, 0).getDate();
            
            for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
            
            for(let d=1; d<=daysInMonth; d++) {
                const f = `${anio}-${String(idx+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const div = document.createElement('div'); div.className = 'dia';
                
                let innerContenido = `<span class="day-num">${d}</span>`;
                
                if(datos[f]) {
                    datos[f].forEach(u => {
                        innerContenido += `<div class="bloque-color" style="background:${users[u]}">${u}</div>`;
                    });
                }
                
                div.innerHTML = innerContenido;
                div.onclick = () => toggle(f);
                grid.appendChild(div);
            }
        });
    }

    function setAnio(a) { anio = a; cargar(); }
    cargar();
</script>
</body>
</html>
