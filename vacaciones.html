<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Vacaciones PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #09090b; --card: #18181b; --accent: #3f3f46; --text: #fafafa; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        button { padding: 10px 20px; border-radius: 8px; border: none; background: #27272a; color: white; cursor: pointer; transition: 0.3s; }
        button:hover { background: #52525b; }
        .selector { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .user-card { padding: 15px; background: var(--card); border-radius: 12px; cursor: pointer; border: 2px solid transparent; text-align: center; }
        .user-card.active { border-color: #3b82f6; }
        
        .calendario-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .mes-card { background: var(--card); padding: 15px; border-radius: 16px; }
        .grid-dias { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .dia { aspect-ratio: 1; border-radius: 6px; background: #27272a; display: flex; flex-direction: column; cursor: pointer; font-size: 0.7rem; overflow: hidden; }
        .bloque { flex: 1; width: 100%; }

        .resumen-tabla { width: 100%; max-width: 900px; margin: 40px auto; background: var(--card); border-radius: 16px; overflow: hidden; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #27272a; }
    </style>
</head>
<body>

    <h1 style="text-align:center">Panel de Vacaciones</h1>
    <div class="nav">
        <button onclick="setAnio(2026)">2026</button>
        <button onclick="setAnio(2027)">2027</button>
    </div>

    <div id="selector" class="selector"></div>
    <div id="resumen-container"></div>
    <div id="cal" class="calendario-container"></div>

    <script>
        const sb = window.supabase.createClient("https://ipxuihzkakirvlszxknd.supabase.co", "sb_publishable_wCYOFOlX8FqkKXPIJ_u1bg_1o2C5La5");
        const users = { 'Joaquin': '#16a34a', 'Juan': '#7e22ce', 'Leon': '#dc2626', 'Sergio': '#ca8a04' };
        let anio = 2026, activeUser = 'Joaquin', datos = {};

        function setAnio(a) { anio = a; cargar(); }
        function setActiveUser(u) { activeUser = u; renderUI(); }

        async function cargar() {
            const { data } = await sb.from('vacaciones_v2').select('*').eq('anio', anio);
            datos = {};
            data?.forEach(r => { if(!datos[r.fecha]) datos[r.fecha] = []; datos[r.fecha].push(r.usuario); });
            renderUI();
        }

        async function toggle(f) {
            if(!datos[f]) datos[f] = [];
            const idx = datos[f].indexOf(activeUser);
            if(idx > -1) {
                await sb.from('vacaciones_v2').delete().match({fecha: f, usuario: activeUser, anio: anio});
                datos[f].splice(idx, 1);
            } else {
                if(datos[f].length < 3) {
                    await sb.from('vacaciones_v2').insert({fecha: f, usuario: activeUser, anio: anio});
                    datos[f].push(activeUser);
                }
            }
            renderUI();
        }

        function renderUI() {
            // Render Selector
            document.getElementById('selector').innerHTML = Object.keys(users).map(u => `
                <div class="user-card ${activeUser === u ? 'active' : ''}" onclick="setActiveUser('${u}')">
                    <div style="width:12px;height:12px;background:${users[u]};border-radius:50%;margin:0 auto 5px"></div>
                    ${u}
                </div>
            `).join('');

            // Render Calendario
            const cal = document.getElementById('cal'); cal.innerHTML = '';
            const meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
            meses.forEach((m, idx) => {
                const mesDiv = document.createElement('div'); mesDiv.className = 'mes-card';
                mesDiv.innerHTML = `<h3>${m}</h3><div class="grid-dias" id="m${idx}"></div>`;
                cal.appendChild(mesDiv);
                const grid = mesDiv.querySelector('.grid-dias');
                const days = new Date(anio, idx + 1, 0).getDate();
                for(let d=1; d<=days; d++) {
                    const f = `${anio}-${String(idx+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const div = document.createElement('div'); div.className = 'dia'; div.innerHTML = `<span style="padding:2px">${d}</span>`;
                    if(datos[f]) datos[f].forEach(u => div.innerHTML += `<div class="bloque" style="background:${users[u]}"></div>`);
                    div.onclick = () => toggle(f);
                    grid.appendChild(div);
                }
            });

            // Render Resumen
            let html = '<table class="resumen-tabla"><tr><th>Usuario</th><th>Detalle de Fechas</th><th>Total</th></tr>';
            Object.keys(users).forEach(u => {
                const lista = Object.keys(datos).filter(f => datos[f].includes(u));
                html += `<tr><td>${u}</td><td>${lista.join(', ')}</td><td><b>${lista.length} días</b></td></tr>`;
            });
            document.getElementById('resumen-container').innerHTML = html + '</table>';
        }

        cargar();
    </script>
</body>
</html>
