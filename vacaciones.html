<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vacaciones 2026-2027</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #09090b; 
            --card: #1e1e24; 
            --text: #fafafa; 
            --border: #2d2d37;
            --day-bg: #131316; 
        }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 12px; 
            margin: 0; 
        }
        
        .container { max-width: 1000px; margin: 0 auto; }
        
        h2 { text-align: center; font-weight: 700; letter-spacing: -0.5px; margin: 15px 0; }
        
        /* Navegación de años */
        .nav { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .btn-anio { 
            padding: 8px 18px; 
            border-radius: 20px; 
            border: 1px solid var(--border); 
            background: #141417; 
            color: #a1a1aa; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        .btn-anio.active { 
            background: #3b82f6; 
            color: white; 
            border-color: #60a5fa;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
        }
        
        /* Selector superior */
        .selector { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 6px; 
            margin-bottom: 20px; 
            width: 100%;
        }
        .user-card { 
            padding: 8px 4px; 
            background: var(--card); 
            border-radius: 12px; 
            border: 2px solid transparent; 
            cursor: pointer; 
            text-align: center; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .user-card.active { border-color: #3b82f6; background: #272732; }
        .user-card strong { display: block; font-size: 0.78rem; letter-spacing: -0.3px; margin-top: 2px; }
        .total-box { font-size: 0.7rem; color: #a1a1aa; margin-top: 2px; }
        
        /* Resumen Detallado */
        .resumen-panel { 
            background: var(--card); 
            padding: 16px; 
            border-radius: 16px; 
            margin-bottom: 25px; 
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }
        .resumen-panel h3 { margin-top: 0; font-size: 1.05rem; font-weight: 600; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 15px; }
        .resumen-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .resumen-item { font-size: 0.85rem; }
        .resumen-item-lineas { margin-top: 6px; padding-left: 8px; border-left: 2px solid transparent; }
        
        /* Calendario */
        .calendario { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 18px; }
        .mes-card { 
            background: var(--card); 
            padding: 14px; 
            border-radius: 16px; 
            border: 1px solid var(--border);
            box-shadow: 0 10px 20px rgba(0,0,0,0.25);
        }
        .mes-card h3 { margin-top: 0; text-align: center; font-size: 1.1rem; font-weight: 600; color: #fff; margin-bottom: 10px; }
        
        .grid-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 0.75rem; color: #71717a; margin-bottom: 6px; font-weight: 600; }
        .grid-dias { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        
        .dia { 
            aspect-ratio: 1; 
            background: var(--day-bg); 
            border-radius: 6px; 
            display: flex; 
            flex-direction: column; 
            cursor: pointer; 
            position: relative; 
            overflow: hidden; 
            transition: transform 0.1s ease, border-color 0.1s ease;
            border: 1px solid #1c1c24;
        }
        .dia:hover { transform: scale(1.05); border-color: #52525b; }
        
        /* Ajuste del número del día */
        .day-num { 
            font-size: 0.7rem; 
            padding: 2px 4px; 
            font-weight: 600; 
            pointer-events: none; 
            z-index: 2; 
            align-self: flex-start; 
        }
        
        /* Estilo del bloque de color con el nombre */
        .bloque-color { 
            flex: 1; 
            width: 100%; 
            pointer-events: none; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem; /* Texto muy pequeño */
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.9); /* Sombra para que destaque */
            line-height: 1;
            overflow: hidden;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Panel de Vacaciones</h2>
    
    <div class="nav">
        <button id="b2026" class="btn-anio" onclick="setAnio(2026)">2026</button>
        <button id="b2027" class="btn-anio" onclick="setAnio(2027)">2027</button>
    </div>
    
    <div id="selector" class="selector"></div>
    <div id="resumen" class="resumen-panel"></div>
    <div id="cal" class="calendario"></div>
</div>

<script>
    const sb = window.supabase.createClient("https://ipxuihzkakirvlszxknd.supabase.co", "sb_publishable_wCYOFOlX8FqkKXPIJ_u1bg_1o2C5La5");
    const users = { 'Joaquin': '#16a34a', 'Juan': '#a855f7', 'Leon': '#ef4444', 'Sergio': '#eab308' };
    const mesesNombres = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    let anio = 2026, activeUser = 'Joaquin', datos = {};

    async function cargar() {
        const { data } = await sb.from('vacaciones_v2').select('*').eq('anio', anio);
        datos = {};
        data?.forEach(r => { if(!datos[r.fecha]) datos[r.fecha] = []; datos[r.fecha].push(r.usuario); });
        render();
    }

    async function toggle(f) {
        if(!datos[f]) datos[f] = [];
        const idx = datos[f].indexOf(activeUser);
        if(idx > -1) {
            datos[f].splice(idx, 1);
            render();
            await sb.from('vacaciones_v2').delete().eq('fecha', f).eq('usuario', activeUser).eq('anio', anio);
        } else if(datos[f].length < 3) {
            datos[f].push(activeUser);
            render();
            await sb.from('vacaciones_v2').insert({fecha: f, usuario: activeUser, anio: anio});
        }
    }

    function render() {
        document.getElementById('b2026').classList.toggle('active', anio === 2026);
        document.getElementById('b2027').classList.toggle('active', anio === 2027);
        
        // Selector de Usuarios
        document.getElementById('selector').innerHTML = Object.keys(users).map(u => {
            const total = Object.keys(datos).filter(f => datos[f].includes(u)).length;
            return `<div class="user-card ${activeUser === u ? 'active' : ''}" onclick="activeUser='${u}'; render()">
                <span style="color:${users[u]}; font-size: 0.85rem;">●</span>
                <strong>${u}</strong>
                <div class="total-box">${total} d</div>
            </div>`;
        }).join('');

        // Resumen Detallado
        let resHtml = '<h3>Resumen de Días Seleccionados</h3><div class="resumen-grid">';
        Object.keys(users).forEach(u => {
            resHtml += `<div class="resumen-item">
                <span style="color:${users[u]}; font-weight: 700; font-size: 0.95rem;">● ${u}</span>
                <div class="resumen-item-lineas" style="border-left-color: ${users[u]}">`;
            
            let tieneDatos = false;
            mesesNombres.forEach((m, i) => {
                const dias = Object.keys(datos)
                    .filter(f => f.startsWith(`${anio}-${String(i+1).padStart(2,'0')}`) && datos[f].includes(u))
                    .map(f => f.split('-')[2])
                    .sort((a, b) => parseInt(a) - parseInt(b));
                
                if(dias.length > 0) {
                    resHtml += `<b style="color: #a1a1aa;">${m}:</b> ${dias.join(', ')}<br>`;
                    tieneDatos = true;
                }
            });
            if(!tieneDatos) resHtml += `<span style="color: #52525b; font-style: italic;">Sin días elegidos</span>`;
            resHtml += `</div></div>`;
        });
        document.getElementById('resumen').innerHTML = resHtml + '</div>';

        // Calendario Completo
        const cal = document.getElementById('cal'); cal.innerHTML = '';
        mesesNombres.forEach((m, idx) => {
            const mesDiv = document.createElement('div'); mesDiv.className = 'mes-card';
            mesDiv.innerHTML = `<h3>${m}</h3>
                <div class="grid-header"><span>D</span><span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span></div>
                <div class="grid-dias" id="m${idx}"></div>`;
            cal.appendChild(mesDiv);
            
            const grid = mesDiv.querySelector('#m'+idx);
            const firstDay = new Date(anio, idx, 1).getDay();
            const daysInMonth = new Date(anio, idx + 1, 0).getDate();
            
            for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
            
            for(let d=1; d<=daysInMonth; d++) {
                const f = `${anio}-${String(idx+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const div = document.createElement('div'); div.className = 'dia';
                
                let innerContenido = `<span class="day-num">${d}</span>`;
                
                // Aquí es donde inyectamos el nombre (u) dentro de su franja de color
                if(datos[f]) {
                    datos[f].forEach(u => {
                        innerContenido += `<div class="bloque-color" style="background:${users[u]}">${u}</div>`;
                    });
                }
                
                div.innerHTML = innerContenido;
                div.onclick = () => toggle(f);
                grid.appendChild(div);
            }
        });
    }

    function setAnio(a) { anio = a; cargar(); }
    cargar();
</script>
</body>
</html>
