<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vacaciones 2026-2027</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #09090b; --card: #18181b; --text: #fafafa; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; padding: 15px; margin: 0; }
        
        .container { max-width: 1000px; margin: 0 auto; }
        .header-title { text-align: center; margin-bottom: 20px; font-size: 2rem; color: #fff; }
        
        .nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .btn-anio { padding: 10px 25px; border-radius: 8px; border: 1px solid #3f3f46; background: #27272a; color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-anio:hover { background: #3f3f46; }
        .btn-anio.activo { background: #3b82f6; border-color: #60a5fa; }
        
        .selector { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .user-card { padding: 12px 20px; background: var(--card); border-radius: 10px; cursor: pointer; border: 2px solid transparent; text-align: center; min-width: 100px; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .user-card.active { border-color: #3b82f6; background: #27272a; transform: scale(1.05); }
        .total-box { font-size: 0.85rem; margin-top: 8px; color: #a1a1aa; font-weight: bold; }

        /* Diseño del Resumen Vertical */
        .resumen-panel { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .resumen-panel h3 { margin-top: 0; text-align: center; margin-bottom: 20px; border-bottom: 1px solid #3f3f46; padding-bottom: 10px; }
        .resumen-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .resumen-user-box { background: #27272a; padding: 15px; border-radius: 8px; }
        .resumen-user-box h4 { margin: 0 0 15px 0; color: #fff; display: flex; align-items: center; gap: 8px; }
        .mes-fila { display: flex; margin-bottom: 8px; font-size: 0.9rem; line-height: 1.4; }
        .mes-nombre { width: 85px; font-weight: bold; color: #a1a1aa; text-transform: capitalize; }
        .mes-dias { flex: 1; color: #e4e4e7; }

        /* Calendario */
        .calendario { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .mes-card { background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .mes-card h3 { margin-top: 0; text-align: center; text-transform: capitalize; }
        .grid-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 0.8rem; color: #71717a; margin-bottom: 8px; font-weight: bold; }
        .grid-dias { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        
        .dia { aspect-ratio: 1; background: #27272a; border-radius: 6px; display: flex; flex-direction: column; cursor: pointer; position: relative; overflow: hidden; transition: 0.1s; border: 1px solid #3f3f46; }
        .dia:hover { border-color: #a1a1aa; }
        
        /* IMPORTANTE: pointer-events: none hace que el clic no falle al tocar el número o el color */
        .day-num { font-size: 0.75rem; padding: 4px; font-weight: bold; pointer-events: none; z-index: 2; position: relative; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .bloque-color { flex: 1; width: 100%; pointer-events: none; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="header-title">Gestión de Vacaciones</h1>
    
    <div class="nav">
        <button id="btn-2026" class="btn-anio" onclick="setAnio(2026)">2026</button>
        <button id="btn-2027" class="btn-anio" onclick="setAnio(2027)">2027</button>
    </div>

    <div id="selector" class="selector"></div>
    <div id="resumen" class="resumen-panel"></div>
    <div id="cal" class="calendario"></div>
</div>

<script>
    const sb = window.supabase.createClient("https://ipxuihzkakirvlszxknd.supabase.co", "sb_publishable_wCYOFOlX8FqkKXPIJ_u1bg_1o2C5La5");
    const users = { 'Joaquin': '#16a34a', 'Juan': '#9333ea', 'Leon': '#dc2626', 'Sergio': '#eab308' };
    const mesesNombres = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
    
    let anio = 2026; 
    let activeUser = 'Joaquin'; 
    let datos = {};

    // Cargar datos desde Supabase
    async function cargar() {
        try {
            const { data, error } = await sb.from('vacaciones_v2').select('*').eq('anio', anio);
            if (error) {
                console.error("Error al cargar:", error);
                alert("Asegúrate de que desactivaste RLS en la tabla vacaciones_v2 de Supabase.");
                return;
            }
            datos = {};
            data?.forEach(r => { 
                if(!datos[r.fecha]) datos[r.fecha] = []; 
                datos[r.fecha].push(r.usuario); 
            });
            render();
        } catch (err) {
            console.error("Error de conexión:", err);
        }
    }

    // Guardar / Borrar día (Actualización visual instantánea)
    async function toggle(f) {
        if(!datos[f]) datos[f] = [];
        const idx = datos[f].indexOf(activeUser);
        
        try {
            if(idx > -1) {
                // Si ya lo tiene, lo quitamos visualmente primero
                datos[f].splice(idx, 1);
                render(); 
                // Y lo borramos en la base de datos
                await sb.from('vacaciones_v2').delete().eq('fecha', f).eq('usuario', activeUser).eq('anio', anio);
            } else if(datos[f].length < 3) {
                // Si no lo tiene, lo añadimos visualmente primero
                datos[f].push(activeUser);
                render();
                // Y lo guardamos en la base de datos
                await sb.from('vacaciones_v2').insert({fecha: f, usuario: activeUser, anio: anio});
            } else {
                alert("Máximo 3 personas por día.");
            }
        } catch(err) {
            console.error("Error al guardar:", err);
            cargar(); // Si falla la base de datos, recargamos para no desincronizar
        }
    }

    // Dibujar la interfaz completa
    function render() {
        // 1. Botones de Año
        document.getElementById('btn-2026').classList.toggle('activo', anio === 2026);
        document.getElementById('btn-2027').classList.toggle('activo', anio === 2027);

        // 2. Selector de Usuarios
        document.getElementById('selector').innerHTML = Object.keys(users).map(u => {
            const total = Object.keys(datos).filter(f => datos[f].includes(u)).length;
            return `
            <div class="user-card ${activeUser === u ? 'active' : ''}" onclick="activeUser='${u}'; render()">
                <div style="color:${users[u]}; font-size:1.2rem;">●</div> 
                <strong>${u}</strong>
                <div class="total-box">${total} días</div>
            </div>`;
        }).join('');

        // 3. Resumen Vertical Legible
        let resHtml = '<h3>Resumen de Días Elegidos</h3><div class="resumen-grid">';
        Object.keys(users).forEach(u => {
            resHtml += `<div class="resumen-user-box">
                <h4><span style="color:${users[u]}">●</span> ${u}</h4>`;
            
            let tieneVacaciones = false;
            mesesNombres.forEach((m, i) => {
                // Buscar los días de este mes para este usuario
                const dias = Object.keys(datos)
                    .filter(f => f.startsWith(`${anio}-${String(i+1).padStart(2,'0')}`) && datos[f].includes(u))
                    .map(f => f.split('-')[2])
                    .sort((a,b) => parseInt(a) - parseInt(b)); // Ordenar numéricamente
                
                if(dias.length > 0) {
                    tieneVacaciones = true;
                    resHtml += `
                    <div class="mes-fila">
                        <div class="mes-nombre">${m}:</div>
                        <div class="mes-dias">${dias.join(', ')}</div>
                    </div>`;
                }
            });

            if(!tieneVacaciones) resHtml += `<div style="color:#71717a; font-size:0.85rem;">Sin días asignados</div>`;
            resHtml += `</div>`;
        });
        resHtml += '</div>';
        document.getElementById('resumen').innerHTML = resHtml;

        // 4. Calendario
        const cal = document.getElementById('cal'); 
        cal.innerHTML = '';
        
        mesesNombres.forEach((m, idx) => {
            const mesDiv = document.createElement('div'); 
            mesDiv.className = 'mes-card';
            
            const firstDay = new Date(anio, idx, 1).getDay();
            const daysInMonth = new Date(anio, idx + 1, 0).getDate();
            
            mesDiv.innerHTML = `<h3>${m}</h3>
                <div class="grid-header"><span>D</span><span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span></div>
                <div class="grid-dias" id="m${idx}"></div>`;
            cal.appendChild(mesDiv);
            
            const grid = mesDiv.querySelector('#m'+idx);
            
            // Huecos en blanco antes del día 1
            for(let i=0; i<firstDay; i++) {
                grid.appendChild(document.createElement('div'));
            }
            
            // Días del mes
            for(let d=1; d<=daysInMonth; d++) {
                const f = `${anio}-${String(idx+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const div = document.createElement('div'); 
                div.className = 'dia'; 
                
                // Añadimos el número del día
                let htmlDia = `<span class="day-num">${d}</span>`;
                
                // Si el día tiene usuarios, dividimos el div en bloques de color
                if(datos[f] && datos[f].length > 0) {
                    datos[f].forEach(u => {
                        htmlDia += `<div class="bloque-color" style="background:${users[u]}"></div>`;
                    });
                }
                
                div.innerHTML = htmlDia;
                div.onclick = () => toggle(f);
                grid.appendChild(div);
            }
        });
    }

    function setAnio(a) { 
        anio = a; 
        cargar(); 
    }
    
    // Iniciar
    cargar();
</script>
</body>
</html>
