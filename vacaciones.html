<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vacaciones 2026-2027 — Bauhaus Neo-Brutalist</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">

    <style>
        /* --- VARIABLES DE DISEÑO (DESIGN.md) --- */
        :root { 
            --bg: #f5f0e8;          /* Warm off-white, aged paper */
            --primary: #1a1a1a;     /* Near-black para texto y bordes */
            --accent-yellow: #ffcc00; /* High-energy para estados activos */
            --accent-blue: #0055ff;  /* Elementos interactivos */
            
            --border-thick: 3px solid #1a1a1a;
            --shadow-offset: 5px 5px 0px #1a1a1a;
        }
        
        /* --- RESET Y CONFIGURACIÓN GLOBAL --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            background: var(--bg); 
            color: var(--primary); 
            font-family: 'Inter', sans-serif; 
            padding: 20px; 
            /* Espacio inferior optimizado para que la barra fija no tape contenido */
            padding-bottom: 140px; 
        }
        
        .container { max-width: 1100px; margin: 0 auto; }
        
        /* Titulares masivos y geométricos */
        h2 { 
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.5rem;
            text-transform: uppercase;
            text-align: left; 
            font-weight: 700; 
            line-height: 0.9;
            letter-spacing: -1px; 
            margin: 20px 0 35px 0;
            border-bottom: var(--border-thick);
            padding-bottom: 15px;
        }

        @media (max-width: 768px) {
            h2 { font-size: 2.2rem; }
        }

        h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        /* --- BARRA INFERIOR FIJA UNIFICADA --- */
        .nav { 
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--bg); /* Sólido, sin glassmorphism */
            border-top: var(--border-thick);
            padding: 1rem 1.5rem;
            z-index: 999; /* La web pasa por detrás */
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 20px; 
            flex-wrap: wrap;
        }

        .nav-group {
            display: flex;
            gap: 10px;
        }

        .nav-divider {
            width: 3px;
            height: 35px;
            background: var(--primary);
        }

        @media (max-width: 650px) {
            .nav {
                padding: 0.75rem;
                gap: 10px;
            }
            .nav-divider {
                display: none;
            }
            body {
                padding-bottom: 180px;
            }
        }

        /* Botones de Navegación de Pantalla y Año */
        .btn-nav, .btn-anio { 
            font-family: 'Space Grotesk', sans-serif;
            padding: 10px 20px; 
            border-radius: 0px; 
            border: var(--border-thick); 
            background: #ffffff; 
            color: var(--primary); 
            cursor: pointer; 
            font-weight: 700;
            text-transform: uppercase;
            font-size: 1rem;
            text-decoration: none;
            display: inline-block;
            box-shadow: var(--shadow-offset);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        /* Hover = Inversión de color */
        .btn-nav:hover, .btn-anio:hover {
            background: var(--primary);
            color: #ffffff;
        }

        /* Estado Activo de Pantalla */
        .btn-nav.active-page {
            background: var(--accent-blue);
            color: #ffffff;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--primary);
        }

        /* Estado Activo de Año */
        .btn-anio.active { 
            background: var(--accent-yellow); 
            color: var(--primary); 
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--primary);
        }
        
        /* --- SELECTOR DE USUARIOS --- */
        .selector { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 12px; 
            margin-bottom: 30px; 
            width: 100%;
        }

        .user-card { 
            padding: 12px; 
            background: #ffffff; 
            border-radius: 0px; 
            border: var(--border-thick); 
            cursor: pointer; 
            text-align: center; 
            box-shadow: var(--shadow-offset);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .user-card.active { 
            background: var(--accent-yellow);
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px var(--primary);
        }

        .user-card strong { 
            display: block; 
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem; 
            text-transform: uppercase;
            margin-top: 2px; 
        }

        .total-box { 
            font-size: 0.85rem; 
            color: var(--primary); 
            font-weight: 600;
            margin-top: 4px; 
        }
        
        /* --- PANEL DE RESUMEN DETALLADO --- */
        .resumen-panel { 
            background: #ffffff; 
            padding: 20px; 
            border-radius: 0px; 
            margin-bottom: 35px; 
            border: var(--border-thick);
            box-shadow: var(--shadow-offset);
        }

        .resumen-panel h3 { 
            font-size: 1.3rem; 
            border-bottom: var(--border-thick); 
            padding-bottom: 8px; 
            margin-bottom: 15px; 
        }

        .resumen-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .resumen-item { font-size: 0.9rem; }
        .resumen-item-lineas { margin-top: 8px; padding-left: 10px; border-left: 3px solid transparent; }
        
        /* --- CALENDARIO BRUTALISTA --- */
        .calendario { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 24px; 
        }

        .mes-card { 
            background: #ffffff; 
            padding: 16px; 
            border-radius: 0px; 
            border: var(--border-thick);
            box-shadow: var(--shadow-offset);
        }

        .mes-card h3 { 
            text-align: left; 
            font-size: 1.4rem; 
            color: var(--primary); 
            margin-bottom: 12px; 
            border-bottom: 2px solid var(--primary);
            padding-bottom: 4px;
        }
        
        .grid-header { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            text-align: center; 
            font-size: 0.8rem; 
            color: var(--primary); 
            margin-bottom: 8px; 
            font-weight: 700; 
            font-family: 'Space Grotesk', sans-serif;
        }

        .grid-dias { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        
        /* Celdas de los Días */
        .dia { 
            aspect-ratio: 1; 
            background: transparent; 
            border-radius: 0px; 
            display: flex; 
            flex-direction: column; 
            cursor: pointer; 
            position: relative; 
            overflow: hidden; 
            border: 2px solid var(--primary);
            transition: background-color 0.1s;
        }

        .dia:hover { 
            background-color: rgba(255, 204, 0, 0.15); 
        }
        
        .day-num { 
            font-size: 0.75rem; 
            padding: 2px 4px; 
            font-weight: 700; 
            pointer-events: none; 
            z-index: 2; 
            align-self: flex-start; 
        }
        
        /* Bloques de color planos dentro de los días asignados */
        .bloque-color { 
            flex: 1; 
            width: 100%; 
            pointer-events: none; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem; 
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            color: #ffffff;
            border-top: 1px solid var(--primary);
            line-height: 1;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Panel de Vacaciones</h2>
    
    <div id="selector" class="selector"></div>
    
    <div id="resumen" class="resumen-panel"></div>
    
    <div id="cal" class="calendario"></div>
</div>

<div class="nav">
    <div class="nav-group">
        <a href="guardias.html" class="btn-nav">Guardias</a>
        <a href="vacaciones.html" class="btn-nav active-page">Vacaciones</a>
    </div>
    <div class="nav-divider"></div>
    <div class="nav-group">
        <button id="b2026" class="btn-anio" onclick="setAnio(2026)">2026</button>
        <button id="b2027" class="btn-anio" onclick="setAnio(2027)">2027</button>
    </div>
</div>

<script>
    const sb = window.supabase.createClient("https://ipxuihzkakirvlszxknd.supabase.co", "sb_publishable_wCYOFOlX8FqkKXPIJ_u1bg_1o2C5La5");
    
    const users = { 'Joaquin': '#16a34a', 'Juan': '#a855f7', 'Leon': '#ef4444', 'Sergio': '#eab308' };
    const mesesNombres = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    let anio = 2026, activeUser = 'Joaquin', datos = {};

    async function cargar() {
        const { data } = await sb.from('vacaciones_v2').select('*').eq('anio', anio);
        datos = {};
        data?.forEach(r => { if(!datos[r.fecha]) datos[r.fecha] = []; datos[r.fecha].push(r.usuario); });
        render();
    }

    async function toggle(f) {
        if(!datos[f]) datos[f] = [];
        const idx = datos[f].indexOf(activeUser);
        if(idx > -1) {
            datos[f].splice(idx, 1);
            render();
            await sb.from('vacaciones_v2').delete().eq('fecha', f).eq('usuario', activeUser).eq('anio', anio);
        } else if(datos[f].length < 3) {
            datos[f].push(activeUser);
            render();
            await sb.from('vacaciones_v2').insert({fecha: f, usuario: activeUser, anio: anio});
        }
    }

    function render() {
        document.getElementById('b2026').classList.toggle('active', anio === 2026);
        document.getElementById('b2027').classList.toggle('active', anio === 2027);
        
        // Selector de Usuarios (Contando solo Lunes a Viernes)
        document.getElementById('selector').innerHTML = Object.keys(users).map(u => {
            const total = Object.keys(datos).filter(f => {
                if(!datos[f].includes(u)) return false; 
                const [y, m, d] = f.split('-');
                const dayOfWeek = new Date(y, m - 1, d).getDay();
                return dayOfWeek !== 0 && dayOfWeek !== 6;
            }).length;
            
            return `<div class="user-card ${activeUser === u ? 'active' : ''}" onclick="activeUser='${u}'; render()">
                <span style="color:${users[u]}; font-size: 1.1rem; vertical-align: middle;">●</span>
                <strong>${u}</strong>
                <div class="total-box">${total} días</div>
            </div>`;
        }).join('');

        // Resumen Detallado
        let resHtml = '<h3>Resumen de Días Seleccionados</h3><div class="resumen-grid">';
        Object.keys(users).forEach(u => {
            resHtml += `<div class="resumen-item">
                <span style="color:${users[u]}; font-weight: 700; font-size: 1.05rem; font-family: 'Space Grotesk'; text-transform: uppercase;">● ${u}</span>
                <div class="resumen-item-lineas" style="border-left-color: ${users[u]}">`;
            
            let tieneDatos = false;
            mesesNombres.forEach((m, i) => {
                const dias = Object.keys(datos)
                    .filter(f => f.startsWith(`${anio}-${String(i+1).padStart(2,'0')}`) && datos[f].includes(u))
                    .map(f => f.split('-')[2])
                    .sort((a, b) => parseInt(a) - parseInt(b));
                
                if(dias.length > 0) {
                    resHtml += `<b style="color: var(--primary); font-family: 'Space Grotesk';">${m}:</b> ${dias.join(', ')}<br>`;
                    tieneDatos = true;
                }
            });
            if(!tieneDatos) resHtml += `<span style="color: #71717a; font-style: italic;">Sin días elegidos</span>`;
            resHtml += `</div></div>`;
        });
        document.getElementById('resumen').innerHTML = resHtml + '</div>';

        // Calendario Completo
        const cal = document.getElementById('cal'); cal.innerHTML = '';
        mesesNombres.forEach((m, idx) => {
            const mesDiv = document.createElement('div'); mesDiv.className = 'mes-card';
            mesDiv.innerHTML = `<h3>${m}</h3>
                <div class="grid-header"><span>D</span><span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span></div>
                <div class="grid-dias" id="m${idx}"></div>`;
            cal.appendChild(mesDiv);
            
            const grid = mesDiv.querySelector('#m'+idx);
            const firstDay = new Date(anio, idx, 1).getDay();
            const daysInMonth = new Date(anio, idx + 1, 0).getDate();
            
            for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
            
            for(let d=1; d<=daysInMonth; d++) {
                const f = `${anio}-${String(idx+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const div = document.createElement('div'); div.className = 'dia';
                
                let innerContenido = `<span class="day-num">${d}</span>`;
                
                if(datos[f]) {
                    datos[f].forEach(u => {
                        innerContenido += `<div class="bloque-color" style="background:${users[u]}">${u}</div>`;
                    });
                }
                
                div.innerHTML = innerContenido;
                div.onclick = () => toggle(f);
                grid.appendChild(div);
            }
        });
    }

    function setAnio(a) { anio = a; cargar(); }
    cargar();
</script>
</body>
</html>
