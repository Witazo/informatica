<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vacaciones 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f0f12; color: #e4e4e7; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .btn-user { padding: 10px 20px; margin: 5px; border-radius: 20px; border: 1px solid #444; cursor: pointer; color: white; background: #222; }
        .btn-user.activo { border-color: #fff; background: #444; }
        .calendario { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; }
        .dia { aspect-ratio: 1; border-radius: 4px; background: #333; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.8rem; }
        .v-Joaquin { background: #166534 !important; } 
        .v-Juan { background: #581c87 !important; }
        .v-Leon { background: #991b1b !important; }
        .v-Sergio { background: #a16207 !important; }
    </style>
</head>
<body>
    <h1>Gestión de Vacaciones 2026</h1>
    <div id="selector">
        <button class="btn-user" onclick="window.setUsuario('Joaquin')">Joaquín</button>
        <button class="btn-user" onclick="window.setUsuario('Juan')">Juan</button>
        <button class="btn-user" onclick="setUsuario('Leon')">León</button>
        <button class="btn-user" onclick="setUsuario('Sergio')">Sergio</button>
    </div>
    <div id="cal" class="calendario"></div>

    <script>
        const sb = window.supabase.createClient(
            "https://ipxuihzkakirvlszxknd.supabase.co",
            "sb_publishable_wCYOFOlX8FqkKXPIJ_u1bg_1o2C5La5"
        );

        let user = 'Joaquin';
        let datos = {}; 

        window.setUsuario = function(u) {
            user = u;
            document.querySelectorAll('.btn-user').forEach(b => b.classList.toggle('activo', b.innerText.includes(u)));
        };

        async function cargar() {
            const { data } = await sb.from('vacaciones').select('*');
            datos = {};
            if(data) data.forEach(r => {
                if(!datos[r.fecha]) datos[r.fecha] = [];
                datos[r.fecha].push(r.usuario);
            });
            render();
        }

        async function toggle(fecha) {
            if(!datos[fecha]) datos[fecha] = [];
            const idx = datos[fecha].indexOf(user);
            if(idx > -1) {
                datos[fecha].splice(idx, 1);
                await sb.from('vacaciones').delete().match({fecha, usuario: user});
            } else {
                if(datos[fecha].length >= 3) { alert("Máximo 3 personas"); return; }
                datos[fecha].push(user);
                await sb.from('vacaciones').insert({fecha, usuario: user, anio: 2026});
            }
            render();
        }

        function render() {
            const cal = document.getElementById('cal');
            cal.innerHTML = '';
            for(let m=0; m<12; m++) {
                const mesDiv = document.createElement('div');
                mesDiv.innerHTML = `<h3>${m+1}</h3><div id="m${m}" style="display:grid; grid-template-columns:repeat(7,1fr); gap:2px;"></div>`;
                cal.appendChild(mesDiv);
                const grid = mesDiv.querySelector('#m'+m);
                const days = new Date(2026, m+1, 0).getDate();
                for(let d=1; d<=days; d++) {
                    const f = `2026-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const dia = document.createElement('div');
                    dia.className = 'dia';
                    if(datos[f]) datos[f].forEach(u => dia.classList.add('v-'+u));
                    dia.innerHTML = d;
                    dia.onclick = () => toggle(f);
                    grid.appendChild(dia);
                }
            }
        }
        cargar();
    </script>
</body>
</html>
