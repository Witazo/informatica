<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vacaciones Multi-Año</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f0f12; --card: #18181b; --text: #e4e4e7; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .controles { margin-bottom: 20px; text-align: center; }
        .resumen { display: flex; gap: 20px; margin-bottom: 20px; background: #222; padding: 15px; border-radius: 10px; }
        .user-box { text-align: center; cursor: pointer; padding: 10px; border: 2px solid transparent; border-radius: 8px; transition: 0.3s; }
        .user-box.activo { border-color: white; background: #333; }
        .punto { width: 15px; height: 15px; border-radius: 50%; margin: 5px auto; }
        
        /* Colores */
        .color-Joaquin { background: #166534; } .color-Juan { background: #581c87; }
        .color-Leon { background: #991b1b; } .color-Sergio { background: #a16207; }
        
        .calendario { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; }
        .dia { aspect-ratio: 1; border-radius: 4px; background: #333; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.8rem; position: relative; }
    </style>
</head>
<body>

    <h1>Gestión de Vacaciones</h1>
    <div class="controles">
        <button onclick="cambiarAnio(2026)">2026</button>
        <button onclick="cambiarAnio(2027)">2027</button>
    </div>

    <div class="resumen" id="resumen"></div>

    <div id="selector" class="resumen">
        </div>

    <div id="cal" class="calendario"></div>

    <script>
        const sb = window.supabase.createClient("https://ipxuihzkakirvlszxknd.supabase.co", "sb_publishable_wCYOFOlX8FqkKXPIJ_u1bg_1o2C5La5");
        
        let anioActual = 2026;
        let user = 'Joaquin';
        let datos = {}; // { '2026-06-02': ['Joaquin', 'Juan'] }
        const usuarios = { 'Joaquin': '#166534', 'Juan': '#581c87', 'Leon': '#991b1b', 'Sergio': '#a16207' };

        function renderSelector() {
            const sel = document.getElementById('selector');
            sel.innerHTML = Object.keys(usuarios).map(u => `
                <div class="user-box ${user === u ? 'activo' : ''}" onclick="setUsuario('${u}')">
                    ${u}
                    <div class="punto" style="background:${usuarios[u]}"></div>
                    <div id="count-${u}">0</div>
                </div>
            `).join('');
        }

        window.setUsuario = function(u) { user = u; renderSelector(); render(); };
        window.cambiarAnio = function(a) { anioActual = a; cargar(); };

        async function cargar() {
            const { data } = await sb.from('vacaciones').select('*').eq('anio', anioActual);
            datos = {};
            if(data) data.forEach(r => {
                if(!datos[r.fecha]) datos[r.fecha] = [];
                datos[r.fecha].push(r.usuario);
            });
            render();
        }

        async function toggle(fecha) {
            if(!datos[fecha]) datos[fecha] = [];
            const idx = datos[fecha].indexOf(user);
            if(idx > -1) {
                datos[fecha].splice(idx, 1);
                await sb.from('vacaciones').delete().match({fecha, usuario: user, anio: anioActual});
            } else {
                if(datos[fecha].length >= 3) { alert("Máximo 3"); return; }
                datos[fecha].push(user);
                await sb.from('vacaciones').insert({fecha, usuario: user, anio: anioActual});
            }
            cargar();
        }

        function render() {
            const cal = document.getElementById('cal');
            cal.innerHTML = '';
            for(let m=0; m<12; m++) {
                const grid = document.createElement('div');
                grid.innerHTML = `<h3>Mes ${m+1}</h3><div style="display:grid; grid-template-columns:repeat(7,1fr); gap:2px;"></div>`;
                cal.appendChild(grid);
                const container = grid.lastChild;
                const days = new Date(anioActual, m+1, 0).getDate();
                for(let d=1; d<=days; d++) {
                    const f = `${anioActual}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const dia = document.createElement('div');
                    dia.className = 'dia';
                    dia.innerHTML = d;
                    // Mostrar colores en degradado si hay varios
                    if(datos[f]) {
                        const colors = datos[f].map(u => usuarios[u]);
                        dia.style.background = colors.length > 1 ? `linear-gradient(45deg, ${colors.join(',')})` : colors[0];
                    }
                    dia.onclick = () => toggle(f);
                    container.appendChild(dia);
                }
            }
            // Actualizar contadores
            Object.keys(usuarios).forEach(u => {
                const total = Object.values(datos).flat().filter(x => x === u).length;
                document.getElementById('count-'+u).innerText = total;
            });
        }

        renderSelector();
        cargar();
    </script>
</body>
</html>
