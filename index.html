<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Guardias y Vacaciones (Multi-Año)</title>
    <style>
        :root {
            --bg-principal: #121214;
            --bg-tarjeta: #1a1a1e;
            --texto-principal: #e1e1e6;
            --texto-secundario: #a8a8b3;
            
            /* Colores de Guardia Base */
            --sergio-color: #4ea8de;
            --sergio-bg: rgba(78, 168, 222, 0.15);
            --joaquin-color: #72efdd;
            --joaquin-bg: rgba(114, 239, 221, 0.15);
            
            /* Colores de Vacaciones */
            --vacas-joaquin-bg: rgba(230, 76, 76, 0.3);  /* Tono Rojizo/Coral */
            --vacas-joaquin-color: #e64c4c;
            --vacas-sergio-bg: rgba(255, 214, 10, 0.25); /* Tono Amarillo */
            --vacas-sergio-color: #ffd60a;
            
            /* Puntos indicadores discretos */
            --punto-joaquin: #390;    /* Verde */
            --punto-sergio: #ff4d4d;   /* Rojo */
            
            --borde: #29292e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
            max-width: 1200px;
            position: relative;
        }

        header h1 {
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 5px;
        }

        header p {
            color: var(--texto-secundario);
            font-size: 0.9rem;
        }

        /* Selector de Año */
        .selector-anio-container {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn-anio {
            background: #202024;
            border: 1px solid var(--borde);
            color: var(--texto-secundario);
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .btn-anio.activo {
            background: #fff;
            color: #121214;
            border-color: #fff;
        }

        /* Buscador Rápido */
        .buscador-contenedor {
            width: 100%;
            max-width: 1200px;
            background: var(--bg-tarjeta);
            border: 1px solid var(--borde);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .buscador-controles {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 500px;
        }

        .buscador-contenedor input[type="date"] {
            flex: 1;
            background: #202024;
            border: 1px solid var(--borde);
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        /* Botón Limpiar */
        .btn-limpiar {
            background: #202024;
            border: 1px solid var(--borde);
            color: var(--texto-secundario);
            padding: 0 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-limpiar:hover {
            background: rgba(230, 76, 76, 0.15);
            color: #e64c4c;
            border-color: #e64c4c;
        }

        .buscador-resultado {
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            min-height: 24px;
        }

        /* Panel de Control y Modos */
        .selector-modo {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--bg-tarjeta);
            padding: 6px;
            border-radius: 30px;
            border: 1px solid var(--borde);
        }

        .btn-modo {
            background: transparent;
            border: none;
            color: var(--texto-secundario);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-modo.activo[data-modo="Joaquín"] {
            background: var(--vacas-joaquin-bg);
            color: #fff;
            border: 1px solid var(--vacas-joaquin-color);
        }

        .btn-modo.activo[data-modo="Sergio"] {
            background: var(--vacas-sergio-bg);
            color: #fff;
            border: 1px solid var(--vacas-sergio-color);
        }

        /* Panel de Leyenda y Estadísticas */
        .panel-resumen {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 30px;
        }

        .tarjeta-usuario {
            background: var(--bg-tarjeta);
            border: 1px solid var(--borde);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tarjeta-usuario.sergio { border-left: 4px solid var(--sergio-color); }
        .tarjeta-usuario.joaquin { border-left: 4px solid var(--joaquin-color); }

        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .guardias-mes-lista {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 5px;
        }

        @media (max-width: 480px) {
            .guardias-mes-lista { grid-template-columns: repeat(3, 1fr); }
        }

        .mes-item {
            background: #202024;
            padding: 4px;
            border-radius: 6px;
            border: 1px solid var(--borde);
        }

        .mes-item span {
            display: block;
            font-weight: bold;
            font-size: 0.9rem;
            margin-top: 2px;
        }

        /* Contenedor del Calendario Anual */
        .calendario-anual {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .mes-contenedor {
            background: var(--bg-tarjeta);
            border: 1px solid var(--borde);
            border-radius: 12px;
            padding: 15px;
        }

        .mes-titulo {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #fff;
            text-transform: capitalize;
        }

        .dias-semana-grid, .dias-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
        }

        .dias-semana-grid div {
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--texto-secundario);
            padding-bottom: 8px;
        }

        .dia {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            user-select: none;
            transition: all 0.2s ease;
            margin: 2px;
            border: 1px solid transparent;
        }

        .dia:hover:not(.vacio) {
            filter: brightness(1.3);
            border-color: #505059;
        }

        .dia.vacio {
            cursor: default;
            background: transparent !important;
        }

        /* Colores Base de Guardias Efectivas */
        .dia.guardia-sergio {
            background-color: var(--sergio-bg);
            color: var(--sergio-color);
            font-weight: 600;
        }
        .dia.guardia-sergio::after {
            content: 'Sergio';
            position: absolute;
            bottom: 2px;
            font-size: 0.55rem;
            opacity: 0.8;
        }

        .dia.guardia-joaquin {
            background-color: var(--joaquin-bg);
            color: var(--joaquin-color);
            font-weight: 600;
        }
        .dia.guardia-joaquin::after {
            content: 'Joaquín';
            position: absolute;
            bottom: 2px;
            font-size: 0.55rem;
            opacity: 0.8;
        }

        /* Fondos Estilos Vacaciones */
        .dia.v-joaquin {
            background-color: var(--vacas-joaquin-bg) !important;
            color: #fff !important;
        }
        
        .dia.v-sergio {
            background-color: var(--vacas-sergio-bg) !important;
            color: #fff !important;
        }

        /* Puntos indicadores discretos */
        .dia.v-joaquin::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            width: 6px;
            height: 6px;
            background-color: var(--punto-joaquin);
            border-radius: 50%;
        }
        
        .dia.v-sergio::before {
            content: '';
            position: absolute;
            top: 4px;
            right: 4px;
            width: 6px;
            height: 6px;
            background-color: var(--punto-sergio);
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="titulo-principal">Guardias y Vacaciones 2026</h1>
        <p></p>
        
        <div class="selector-anio-container">
            <button class="btn-anio activo" onclick="cambiarAnio(2026)">2026</button>
            <button class="btn-anio" onclick="cambiarAnio(2027)">2027</button>
        </div>
    </header>

    <div class="buscador-contenedor">
        <label for="buscar-fecha" id="label-buscador" style="font-size: 0.9rem; font-weight: bold; color: var(--texto-secundario);"> Buscador rápido de guardia (2026):</label>
        <div class="buscador-controles">
            <input type="date" id="buscar-fecha" min="2026-01-01" max="2026-12-31">
            <button class="btn-limpiar" onclick="limpiarBusqueda()">Limpiar</button>
        </div>
        <div class="buscador-resultado" id="resultado-busqueda"></div>
    </div>

    <div style="text-align: center; margin-bottom: 5px; font-size: 0.85rem; color: var(--texto-secundario);">Marca tus vacaciones</div>
    <div class="selector-modo">
        <button class="btn-modo activo" data-modo="Joaquín">JOAQUÍN</button>
        <button class="btn-modo" data-modo="Sergio">SERGIO</button>
    </div>

    <div class="panel-resumen">
        <div class="tarjeta-usuario sergio">
            <div class="user-header">
                <span style="color: var(--sergio-color)">● Sergio</span>
                <span id="total-sergio" style="font-size: 0.9rem;">Total Año: 0</span>
            </div>
            <div class="guardias-mes-lista" id="lista-meses-sergio"></div>
        </div>

        <div class="tarjeta-usuario joaquin">
            <div class="user-header">
                <span style="color: var(--joaquin-color)">● Joaquín</span>
                <span id="total-joaquin" style="font-size: 0.9rem;">Total Año: 0</span>
            </div>
            <div class="guardias-mes-lista" id="lista-meses-joaquin"></div>
        </div>
    </div>

    <div class="calendario-anual" id="calendario-completo"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>

        const SUPABASE_URL = "https://ipxuihzkakirvlszxknd.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_wCYOFOlX8FqkKXPIJ_u1bg_1o2C5La5";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const nombresMeses = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
        const diasSemanaLetras = ["L", "M", "X", "J", "V", "S", "D"];
        
        let anioActual = 2026;
        let modoVacacionesActual = 'Joaquín';

        let vacacionesPorAnio = {
            2026: { Joaquín: {}, Sergio: {} },
            2027: { Joaquín: {}, Sergio: {} }
        };

        let semanasPorAnio = {
            2026: [],
            2027: []
        };

        function inicializarSemanas() {
            let fechaIteracion2026 = new Date(2025, 11, 29);
            let titularActual = 'Sergio';

            for (let i = 0; i < 54; i++) {
                let lunes = new Date(fechaIteracion2026);
                let domingo = new Date(fechaIteracion2026);
                domingo.setDate(lunes.getDate() + 6);

                let mesCobro = domingo.getMonth(); 
                if (domingo.getFullYear() !== 2026) {
                    mesCobro = domingo.getFullYear() < 2026 ? -1 : 12;
                }

                semanasPorAnio[2026].push({
                    id: i, lunes: lunes, domingo: domingo, titularBase: titularActual, mesCobro: mesCobro
                });

                titularActual = (titularActual === 'Sergio') ? 'Joaquín' : 'Sergio';
                fechaIteracion2026.setDate(fechaIteracion2026.getDate() + 7);
            }

            let ultimaSemana2026 = semanasPorAnio[2026][semanasPorAnio[2026].length - 1];
            let titularInicio2027 = (ultimaSemana2026.titularBase === 'Sergio') ? 'Joaquín' : 'Sergio';

            let fechaIteracion2027 = new Date(2026, 11, 28);
            titularActual = titularInicio2027;

            for (let i = 0; i < 54; i++) {
                let lunes = new Date(fechaIteracion2027);
                let domingo = new Date(fechaIteracion2027);
                domingo.setDate(lunes.getDate() + 6);

                let mesCobro = domingo.getMonth(); 
                if (domingo.getFullYear() !== 2027) {
                    mesCobro = domingo.getFullYear() < 2027 ? -1 : 12;
                }

                semanasPorAnio[2027].push({
                    id: i, lunes: lunes, domingo: domingo, titularBase: titularActual, mesCobro: mesCobro
                });

                titularActual = (titularActual === 'Sergio') ? 'Joaquín' : 'Sergio';
                fechaIteracion2027.setDate(fechaIteracion2027.getDate() + 7);
            }
        }

                        }
                    });
                }

                actualizarPanelesEfectivos();
                renderizarCalendarioCompleto();
                ejecutarBusqueda();
            } catch (err) {
                console.error("Error al sincronizar con Supabase:", err.message);
            }
        }

        function analizarDiaEfectivo(fecha, anio) {
            const semanas = semanasPorAnio[anio];
            const semana = semanas.find(s => fecha >= s.lunes && fecha <= s.domingo);

            const fechaStr = fecha.toISOString().split('T')[0];
            const vacasJoaquin = vacacionesPorAnio[anio].Joaquín[fechaStr] || false;
            const vacasSergio = vacacionesPorAnio[anio].Sergio[fechaStr] || false;
